services:
  api:
    image: ${DOCKER_REGISTRY-}api
    build:
        context: .
        dockerfile: Dockerfile
    environment:
      - ASPNETCORE_URLS=http://+:8081
      - ASPNETCORE_ENVIRONMENT=Integration
    ports:
      - "8081:8081"
    healthcheck:
      test: wget -q --tries=1 --spider http://localhost:8081/elastic-app/v1/health/ready || exit 1
      interval: 5s
      retries: 10
      start_period: 5s
    depends_on: 
      sqlserver-local:
        condition: service_healthy
      kafka:
        condition: service_healthy
  dashboard-api:
    image: ${DOCKER_REGISTRY-}dashboard-api
    build:
        context: .
        dockerfile: elastic_app_v3.dashboard/Dockerfile
    environment:
      - ASPNETCORE_URLS=http://+:8082
      - ASPNETCORE_ENVIRONMENT=Integration
    ports:
      - "8082:8082"
    # healthcheck:
    #   test: wget -q --tries=1 --spider http://localhost:8082/elastic-app-dashboard/v1/health/ready || exit 1
    #   interval: 5s
    #   retries: 10
    #   start_period: 5s
    depends_on:
      kafka:
        condition: service_healthy
  kafka:
    image: apache/kafka:latest
    container_name: broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
  sqlserver-local:
    build:
      context: ./Mock/User
      dockerfile: Dockerfile
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD_FILE=/run/secrets/MSSQL_SA_PASSWORD
      - TZ=UTC
      - SQLHOST=localhost
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -C -U sa -P $(cat /run/secrets/MSSQL_SA_PASSWORD) -S localhost -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    secrets:
        - MSSQL_SA_PASSWORD
secrets:
  MSSQL_SA_PASSWORD:
    file: .mssql-sa-password